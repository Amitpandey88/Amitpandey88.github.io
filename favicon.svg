<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="4" y1="5" x2="28" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="55%"  stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="1" x2="8" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="c"><rect width="32" height="32" rx="7"/></clipPath>
  </defs>

  <rect width="32" height="32" rx="7" fill="#080b11"/>
  <ellipse cx="10" cy="9" rx="16" ry="14" fill="#6c63ff" opacity="0.35" clip-path="url(#c)"/>
  <circle  cx="26" cy="25" r="11"        fill="#00d4ff" opacity="0.10" clip-path="url(#c)"/>

  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.25"
        fill="rgba(255,255,255,0.02)"
        stroke="url(#g)" stroke-width="1" opacity="0.55"/>

  <rect x="1" y="1" width="30" height="14" rx="6"
        fill="url(#shine)" clip-path="url(#c)"/>

  <!-- Letter A: left stroke, right stroke, crossbar -->
  <path d="M 4 27 L 9 27 L 16 5 Z
           M 23 27 L 28 27 L 16 5 Z
           M 11 17 L 21 17 L 21 21 L 11 21 Z"
        fill="url(#g)" filter="url(#glow)"/>

  <circle cx="25" cy="6.5" r="1.5" fill="#00d4ff" opacity="0.85"/>
</svg>
