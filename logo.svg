<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="50%"  stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="grad-text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#080b11"/>
  <!-- Gradient border ring -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <!-- Left bracket -->
  <text x="5" y="44" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="26" font-weight="700" fill="#6c63ff">&lt;</text>
  <!-- Letter A -->
  <text x="18" y="44" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="26" font-weight="700" fill="url(#grad-text)">A</text>
  <!-- Right bracket / -->
  <text x="39" y="44" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="26" font-weight="700" fill="#00d4ff">/&gt;</text>
</svg>
