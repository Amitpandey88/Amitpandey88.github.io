<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Main gradient (user-space so it flows across all sub-paths) -->
    <linearGradient id="grad" x1="8" y1="10" x2="56" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="55%"  stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <!-- Liquid-glass top-shine gradient -->
    <linearGradient id="glass-shine" x1="0" y1="2" x2="16" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="45%"  stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Ambient purple glow -->
    <radialGradient id="bg-glow" cx="30%" cy="28%" r="62%">
      <stop offset="0%"   stop-color="#6c63ff" stop-opacity="0.50"/>
      <stop offset="55%"  stop-color="#a259ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6c63ff"  stop-opacity="0"/>
    </radialGradient>
    <!-- Letter glow filter -->
    <filter id="letter-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip to rounded square -->
    <clipPath id="bg-clip">
      <rect width="64" height="64" rx="15"/>
    </clipPath>
  </defs>

  <!-- ░░ BACKGROUND ░░ -->
  <rect width="64" height="64" rx="15" fill="#080b11"/>

  <!-- Ambient purple glow (top-left) -->
  <ellipse cx="20" cy="18" rx="34" ry="30" fill="url(#bg-glow)" clip-path="url(#bg-clip)"/>

  <!-- Cyan accent glow (bottom-right) -->
  <circle cx="53" cy="51" r="22" fill="#00d4ff" opacity="0.11" clip-path="url(#bg-clip)"/>

  <!-- ░░ GLASS PANEL ░░ -->
  <!-- Gradient border ring -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13.5"
        fill="rgba(255,255,255,0.025)"
        stroke="url(#grad)" stroke-width="1.5" opacity="0.55"/>

  <!-- Liquid-glass top highlight (frosted-glass shine) -->
  <rect x="2" y="2" width="60" height="28" rx="13"
        fill="url(#glass-shine)" clip-path="url(#bg-clip)"/>

  <!-- Thin inner arc highlight at very top -->
  <path d="M 9 4 Q 32 2.5 55 4"
        stroke="rgba(255,255,255,0.13)" stroke-width="1"
        fill="none" stroke-linecap="round"/>

  <!-- ░░ LETTER A (path-based — crisp at every size) ░░ -->
  <!--
    Three filled paths with shared gradient:
      Left stroke  : triangle (8,54)–(18,54)–(32,10)
      Right stroke : triangle (46,54)–(56,54)–(32,10)
      Crossbar     : filled polygon x=22..42, y=33..40
  -->
  <path d="M 8 54 L 18 54 L 32 10 Z
           M 46 54 L 56 54 L 32 10 Z
           M 22 33 L 42 33 L 42 40 L 22 40 Z"
        fill="url(#grad)"
        filter="url(#letter-glow)"/>

  <!-- ░░ ACCENTS ░░ -->
  <!-- Cyan dot (top-right) -->
  <circle cx="50" cy="13" r="2.8" fill="#00d4ff" opacity="0.82"/>

  <!-- Subtle bottom-right corner reflection -->
  <path d="M 52 62 Q 62 62 62 52 L 62 58 Q 62 62 58 62 Z"
        fill="rgba(0,212,255,0.07)" clip-path="url(#bg-clip)"/>
</svg>
